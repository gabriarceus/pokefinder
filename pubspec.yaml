name: pokefinder
description: The best app to find information about Pokémon.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  bloc: ^8.1.4
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_bloc: ^8.1.5
  flutter_spinkit: ^5.2.1
  gap: ^3.0.1
  injectable:
  get_it: ^7.7.0
  go_router: ^14.1.4
  http: ^0.13.3
  meta: ^1.12.0
  pokeball_widget: ^1.0.0+3
  json_annotation: ^4.9.0
  flutter_localizations:
    sdk: flutter
  intl: any
  dartz: ^0.10.1
  just_audio: ^0.9.38
  hydrated_bloc: ^9.1.5
  hive_ce: ^2.10.1
  path_provider: ^2.1.5
  en_logger: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.3.3
  json_serializable: ^6.8.0
  injectable_generator:
  mocktail: ^1.0.4
  bloc_test: ^9.1.7
  network_image_mock: ^2.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/sad_azurill.png
