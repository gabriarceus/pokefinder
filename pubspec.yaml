name: pokefinder
description: The best app to find information about Pokémon.
publish_to: "none"
version: 1.0.0-rc1+2

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  bloc: ^9.0.1
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_bloc: ^9.1.1
  flutter_spinkit: ^5.2.1
